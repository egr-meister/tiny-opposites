name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    name: Build Release APK and AAB
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependencies
        run: npx expo install --fix
        continue-on-error: true

      - name: Run Expo Doctor
        run: npx expo-doctor
        continue-on-error: true

      - name: Check Expo dependency versions
        run: npx expo install --check
        continue-on-error: true

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Decode release keystore
        run: bash scripts/decode-keystore.sh

      - name: Configure Android release signing
        run: node scripts/configure-android-release.js

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Rename artifacts
        run: node scripts/collect-artifacts.js

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny-opposites-release-apk
          path: artifacts/tiny-opposites-release.apk
          if-no-files-found: warn

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny-opposites-release-aab
          path: artifacts/tiny-opposites-release.aab
          if-no-files-found: warn
